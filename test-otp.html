<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test OTP System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #1a1a1a;
            color: #fff;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }
        .test-section {
            background: #2d2d2d;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
            border: 1px solid #444;
        }
        button {
            background: #0a66c2;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin: 10px 5px;
        }
        button:hover {
            background: #085a9e;
        }
        .result {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 6px;
            margin: 10px 0;
            border-left: 4px solid #0a66c2;
        }
        input {
            width: 100%;
            padding: 12px;
            background: #1a1a1a;
            border: 2px solid #444;
            border-radius: 6px;
            color: #fff;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <h1>🔧 OTP System Test</h1>
    
    <div class="test-section">
        <h3>📧 Test Email OTP</h3>
        <input type="email" id="emailInput" value="skportfolio57@gmail.com" placeholder="Enter email">
        <button onclick="testEmailOTP()">Send Email OTP</button>
        <div id="emailResult" class="result" style="display:none;"></div>
    </div>
    
    <div class="test-section">
        <h3>📱 Test SMS OTP</h3>
        <input type="tel" id="phoneInput" value="+918904851665" placeholder="Enter phone">
        <button onclick="testSMSOTP()">Send SMS OTP</button>
        <div id="smsResult" class="result" style="display:none;"></div>
    </div>
    
    <div class="test-section">
        <h3>🔍 Check Server Status</h3>
        <button onclick="checkHealth()">Check Server Health</button>
        <div id="healthResult" class="result" style="display:none;"></div>
    </div>
    
    <div class="test-section">
        <h3>📋 Instructions</h3>
        <p>1. Click buttons to test OTP sending</p>
        <p>2. Check server console for OTP codes</p>
        <p>3. Check Gmail inbox for email OTP</p>
        <p>4. Use console OTP if email doesn't arrive</p>
    </div>

    <script>
        async function testEmailOTP() {
            const email = document.getElementById('emailInput').value;
            const resultDiv = document.getElementById('emailResult');
            
            try {
                const response = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ identifier: email, method: 'email' })
                });
                
                const data = await response.json();
                resultDiv.innerHTML = `
                    <strong>Response:</strong><br>
                    Success: ${data.success}<br>
                    Message: ${data.message}<br>
                    Contact: ${data.maskedContact || 'N/A'}
                `;
                resultDiv.style.display = 'block';
                
                if (data.success) {
                    resultDiv.style.borderColor = '#28a745';
                } else {
                    resultDiv.style.borderColor = '#dc3545';
                }
            } catch (error) {
                resultDiv.innerHTML = `<strong>Error:</strong> ${error.message}`;
                resultDiv.style.display = 'block';
                resultDiv.style.borderColor = '#dc3545';
            }
        }
        
        async function testSMSOTP() {
            const phone = document.getElementById('phoneInput').value;
            const resultDiv = document.getElementById('smsResult');
            
            try {
                const response = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ identifier: phone, method: 'phone' })
                });
                
                const data = await response.json();
                resultDiv.innerHTML = `
                    <strong>Response:</strong><br>
                    Success: ${data.success}<br>
                    Message: ${data.message}<br>
                    Contact: ${data.maskedContact || 'N/A'}
                `;
                resultDiv.style.display = 'block';
                
                if (data.success) {
                    resultDiv.style.borderColor = '#28a745';
                } else {
                    resultDiv.style.borderColor = '#dc3545';
                }
            } catch (error) {
                resultDiv.innerHTML = `<strong>Error:</strong> ${error.message}`;
                resultDiv.style.display = 'block';
                resultDiv.style.borderColor = '#dc3545';
            }
        }
        
        async function checkHealth() {
            const resultDiv = document.getElementById('healthResult');
            
            try {
                const response = await fetch('/api/health');
                const data = await response.json();
                resultDiv.innerHTML = `<strong>Server Status:</strong> ${data.status}`;
                resultDiv.style.display = 'block';
                resultDiv.style.borderColor = '#28a745';
            } catch (error) {
                resultDiv.innerHTML = `<strong>Server Error:</strong> ${error.message}`;
                resultDiv.style.display = 'block';
                resultDiv.style.borderColor = '#dc3545';
            }
        }
    </script>
</body>
</html>
