<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Portfolio Admin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .forgot-container {
            background: rgba(45, 45, 45, 0.9);
            padding: 40px;
            border-radius: 15px;
            border: 1px solid #444;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            width: 100%;
            max-width: 450px;
        }
        
        .forgot-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .forgot-header h1 {
            color: #0a66c2;
            font-size: 1.8rem;
            margin-bottom: 10px;
        }
        
        .forgot-header p {
            color: #ccc;
            font-size: 0.9rem;
        }
        
        .step {
            display: none;
        }
        
        .step.active {
            display: block;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #ccc;
            font-weight: 500;
        }
        
        .form-group input, .form-group select {
            width: 100%;
            padding: 15px;
            background: #1a1a1a;
            border: 2px solid #444;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #0a66c2;
            box-shadow: 0 0 10px rgba(10, 102, 194, 0.3);
        }
        
        .method-selection {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .method-option {
            background: #1a1a1a;
            border: 2px solid #444;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .method-option:hover, .method-option.selected {
            border-color: #0a66c2;
            background: rgba(10, 102, 194, 0.1);
        }
        
        .method-option i {
            font-size: 2rem;
            color: #0a66c2;
            margin-bottom: 10px;
        }
        
        .btn {
            width: 100%;
            background: linear-gradient(135deg, #0a66c2 0%, #085a9e 100%);
            color: white;
            padding: 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(10, 102, 194, 0.4);
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .btn-secondary {
            background: #6c757d;
            margin-top: 15px;
        }
        
        .btn-secondary:hover {
            background: #5a6268;
            box-shadow: 0 8px 20px rgba(108, 117, 125, 0.4);
        }
        
        .message {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
        }
        
        .error-message {
            background: rgba(220, 53, 69, 0.1);
            border: 1px solid #dc3545;
            color: #dc3545;
        }
        
        .success-message {
            background: rgba(40, 167, 69, 0.1);
            border: 1px solid #28a745;
            color: #28a745;
        }
        
        .info-message {
            background: rgba(23, 162, 184, 0.1);
            border: 1px solid #17a2b8;
            color: #17a2b8;
        }
        
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        
        .back-link a {
            color: #0a66c2;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }
        
        .back-link a:hover {
            color: #085a9e;
        }
        
        .otp-input {
            text-align: center;
            font-size: 24px;
            letter-spacing: 8px;
            font-weight: bold;
        }
        
        .contact-info {
            background: rgba(255, 193, 7, 0.1);
            border: 1px solid #ffc107;
            color: #ffc107;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="forgot-container">
        <div class="forgot-header">
            <h1>Reset Password</h1>
            <p>Recover access to your admin account</p>
        </div>
        
        <div id="errorMessage" class="message error-message"></div>
        <div id="successMessage" class="message success-message"></div>
        <div id="infoMessage" class="message info-message"></div>
        
        <!-- Step 1: Choose Reset Method -->
        <div id="step1" class="step active">
            <div class="form-group">
                <label>Enter Username, Email, or Phone Number</label>
                <input type="text" id="identifier" placeholder="admin / skportfolio57@gmail.com / +918904851665">
            </div>
            
            <div class="form-group">
                <label>Choose Verification Method</label>
                <div class="method-selection">
                    <div class="method-option" onclick="selectMethod('email')">
                        <i class="fas fa-envelope"></i>
                        <div>Email OTP</div>
                    </div>
                    <div class="method-option" onclick="selectMethod('phone')">
                        <i class="fas fa-sms"></i>
                        <div>SMS OTP</div>
                    </div>
                </div>
            </div>
            
            <button onclick="sendOTP()" class="btn" id="sendOTPBtn">
                Send OTP
            </button>
        </div>
        
        <!-- Step 2: Enter OTP -->
        <div id="step2" class="step">
            <div class="contact-info" id="contactInfo"></div>
            
            <div class="form-group">
                <label>Enter 6-Digit OTP</label>
                <input type="text" id="otpCode" class="otp-input" placeholder="000000" maxlength="6">
            </div>
            
            <button onclick="verifyOTP()" class="btn" id="verifyOTPBtn">
                Verify OTP
            </button>
            
            <button onclick="goToStep1()" class="btn btn-secondary">
                Back to Method Selection
            </button>
        </div>
        
        <!-- Step 3: Reset Password -->
        <div id="step3" class="step">
            <div class="form-group">
                <label>New Password</label>
                <input type="password" id="newPassword" placeholder="Enter new password (min 6 chars)">
            </div>
            
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Confirm new password">
            </div>
            
            <button onclick="resetPassword()" class="btn" id="resetPasswordBtn">
                Reset Password
            </button>
        </div>
        
        <div class="back-link">
            <a href="/admin/login">← Back to Login</a>
        </div>
    </div>

    <script>
        let selectedMethod = null;
        let userIdentifier = null;
        
        function selectMethod(method) {
            selectedMethod = method;
            document.querySelectorAll('.method-option').forEach(option => {
                option.classList.remove('selected');
            });
            event.target.closest('.method-option').classList.add('selected');
        }
        
        function showMessage(type, text) {
            // Hide all messages
            document.querySelectorAll('.message').forEach(msg => {
                msg.style.display = 'none';
            });
            
            // Show specific message
            const messageEl = document.getElementById(type + 'Message');
            messageEl.textContent = text;
            messageEl.style.display = 'block';
        }
        
        function goToStep(stepNumber) {
            document.querySelectorAll('.step').forEach(step => {
                step.classList.remove('active');
            });
            document.getElementById('step' + stepNumber).classList.add('active');
        }
        
        function goToStep1() {
            goToStep(1);
            showMessage('info', 'Choose a different verification method if needed.');
        }
        
        async function sendOTP() {
            const identifier = document.getElementById('identifier').value.trim();
            
            if (!identifier) {
                showMessage('error', 'Please enter your username, email, or phone number');
                return;
            }
            
            if (!selectedMethod) {
                showMessage('error', 'Please select a verification method');
                return;
            }
            
            const sendOTPBtn = document.getElementById('sendOTPBtn');
            sendOTPBtn.disabled = true;
            sendOTPBtn.textContent = 'Sending OTP...';
            
            try {
                const response = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ identifier, method: selectedMethod })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    userIdentifier = identifier;
                    document.getElementById('contactInfo').textContent = 
                        `OTP sent to ${data.maskedContact} via ${data.method}. Check your ${data.method} and enter the 6-digit code below.`;
                    goToStep(2);
                    showMessage('success', data.message);
                } else {
                    showMessage('error', data.error || 'Failed to send OTP');
                }
            } catch (error) {
                showMessage('error', 'Network error. Please try again.');
            } finally {
                sendOTPBtn.disabled = false;
                sendOTPBtn.textContent = 'Send OTP';
            }
        }
        
        async function verifyOTP() {
            const otpCode = document.getElementById('otpCode').value.trim();
            
            if (!otpCode || otpCode.length !== 6) {
                showMessage('error', 'Please enter a valid 6-digit OTP');
                return;
            }
            
            const verifyOTPBtn = document.getElementById('verifyOTPBtn');
            verifyOTPBtn.disabled = true;
            verifyOTPBtn.textContent = 'Verifying...';
            
            // Store OTP for password reset
            window.tempOTP = otpCode;
            
            // Move to password reset step
            goToStep(3);
            showMessage('success', 'OTP verified! Enter your new password.');
            
            verifyOTPBtn.disabled = false;
            verifyOTPBtn.textContent = 'Verify OTP';
        }
        
        async function resetPassword() {
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (!newPassword || !confirmPassword) {
                showMessage('error', 'Please fill in both password fields');
                return;
            }
            
            if (newPassword.length < 6) {
                showMessage('error', 'Password must be at least 6 characters');
                return;
            }
            
            if (newPassword !== confirmPassword) {
                showMessage('error', 'Passwords do not match');
                return;
            }
            
            const resetPasswordBtn = document.getElementById('resetPasswordBtn');
            resetPasswordBtn.disabled = true;
            resetPasswordBtn.textContent = 'Resetting Password...';
            
            try {
                const response = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        identifier: userIdentifier, 
                        otp: window.tempOTP, 
                        newPassword 
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showMessage('success', 'Password reset successfully! Redirecting to login...');
                    setTimeout(() => {
                        window.location.href = '/admin/login';
                    }, 2000);
                } else {
                    showMessage('error', data.error || 'Password reset failed');
                }
            } catch (error) {
                showMessage('error', 'Network error. Please try again.');
            } finally {
                resetPasswordBtn.disabled = false;
                resetPasswordBtn.textContent = 'Reset Password';
            }
        }
        
        // Auto-format OTP input
        document.getElementById('otpCode').addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length > 6) value = value.slice(0, 6);
            e.target.value = value;
        });
    </script>
</body>
</html>
